<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABCD Clinic - Sign Up</title>
</head>

<body>
    <form name="p_info" action="booking_success.html" method="post">
        <table width="100%" cellspacing="0" cellpadding="16">
            <tr>
                <td>
                    <a href="patient.html">
                        <img src="arrow_back.svg" width="24" height="24" />
                    </a>
                </td>
            </tr>
            <tr>
                <td>
                    <h3>
                        Step 3/3: Sign Up (New Patient)
                    </h3>
                    <h1>
                        Please fill in your details below.
                    </h1>
                    <p>
                        We'll keep your information confidential.
                    </p>
                    <p>
                        Please fill in all the fields below.
                    </p>
                    <table width="100%" bgcolor="#e1f3f8" border="1" bordercolor="#9e9e9e" cellspacing="0"
                        cellpadding="8">
                        <tr>
                            <th colspan="2" align="left">
                                <i>
                                    Personal Particulars
                                </i>
                            </th>
                        </tr>
                        <tr>
                            <td>
                                <label for="name">
                                    Full Name
                                </label>
                            </td>
                            <td align="right">
                                <input type="text" name="p_name" id="name" required />
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <label for="hkid">
                                    HKID No.
                                </label>
                            </td>
                            <td align="right">
                                <input type="text" name="p_hkid" id="hkid" minlength="7" maxlength="7" size="10"
                                    required />
                                (
                                <input type="text" name="p_hkid_last" minlength="1" maxlength="1" size="1" required />
                                )
                            </td>
                        </tr>
                        <tr>
                            <td>
                                Gender
                            </td>
                            <td align="right">
                                <input type="radio" name="p_gender" id="gender_male" value="male" required />
                                <label for="gender_male">Male</label>
                                <input type="radio" name="p_gender" id="gender_female" value="female" required />
                                <label for="gender_female">Female</label>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <label for="dob">
                                    Date of Birth
                                </label>
                            </td>
                            <td align="right">
                                <input type="date" name="p_dob" id="dob" required />
                            </td>
                        </tr>
                        <tr>
                            <th colspan="2" align="left">
                                <i>
                                    Contact Information
                                </i>
                            </th>
                        </tr>
                        <tr>
                            <td>
                                <label for="tel">
                                    Contact No.
                                </label>
                            </td>
                            <td align="right">
                                <input type="tel" name="p_tel" id="tel" minlength="8" maxlength="8" size="20"
                                    required />
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <label for="address">
                                    Home Address
                                </label>
                            </td>
                            <td align="right">
                                <textarea name="p_address" id="address" rows="3" cols="30" required></textarea>
                                <br />
                                <select name="p_district" required>
                                    <optgroup label="New Territories">
                                        <option value="islands">Islands</option>
                                        <option value="kwai_tsing">Kwai Tsing</option>
                                        <option value="north">North</option>
                                        <option value="sai_kung">Sai Kung</option>
                                        <option value="sha_tin">Sha Tin</option>
                                        <option value="tai_po">Tai Po</option>
                                        <option value="tsuen_wan">Tsuen Wan</option>
                                        <option value="tuen_mun">Tuen Mun</option>
                                        <option value="yuen_long">Yuen Long</option>
                                    </optgroup>
                                    <optgroup label="Kowloon">
                                        <option value="kowloon_city">Kowloon City</option>
                                        <option value="kwun_tong">Kwun Tong</option>
                                        <option value="sham_shui_po">Sham Shui Po</option>
                                        <option value="wong_tai_sin">Wong Tai Sin</option>
                                        <option value="yau_tsim_mong">Yau Tsim Mong</option>
                                    </optgroup>
                                    <optgroup label="Hong Kong Islands">
                                        <option value="central_western">Central &amp; Western
                                        </option>
                                        <option value="eastern">Eastern</option>
                                        <option value="southern">Southern</option>
                                        <option value="wan_chai">Wan Chai</option>
                                    </optgroup>
                                </select>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="reset" />
                    <input type="submit" />
                    <a href="booking_success.html">To finish booking.</a>
                </td>
            </tr>
        </table>
    </form>
</body>

</html>
