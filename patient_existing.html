<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Existing Patient</title>
</head>

<body>
    <font face="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
        <form action="booking_success.html" method="post">
            <table width="100%" cellspacing="0" cellpadding="16">
                <tr>
                    <td>
                        <table width="100%" cellspacing="0" cellpadding="0">
                            <tr>
                                <td>
                                    <a href="patient.html">
                                        <img src="icons/arrow_back.svg" width="24" height="24" />
                                    </a>
                                </td>
                                <td>
                                    <table bgcolor="#283593" cellpadding="16">
                                        <tr>
                                            <td>
                                                <font color="#FFFFFF" size="+3">
                                                    <i>ABCD Clinic</i>
                                                </font>
                                            </td>
                                        </tr>
                                    </table>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr>
                    <td>
                        <h1>
                            Welcome back.
                        </h1>
                        <p>
                            <font color="#424242" size="+2">
                                <i>Please enter your identity information.</i>
                            </font>
                        </p>
                        <fieldset>
                            <table cellpadding="8">
                                <tr>
                                    <td>
                                        <label for="hkid">*<b>First 6 Digits</b> of your HKID</label>
                                    </td>
                                    <td>
                                        <input type="number" id="hkid" name="p_hkid" min="1" max="999999" required />
                                    </td>
                                </tr>
                                <tr>
                                    <td colspan="2" align="right">
                                        <i>e.g. Enter 123456 for S<u>123456</u>(7)</i>
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <label for="dob">*Date of Birth:</label>
                                    </td>
                                    <td>
                                        <input type="date" id="dob" name="p_dob" required />
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <label for="tel">*Contact no.</label>
                                    </td>
                                    <td>
                                        <input type="tel" id="tel" name="p_tel" minlength="8" maxlength="8" required />
                                    </td>
                                </tr>
                            </table>
                        </fieldset>
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="reset" />
                        <input type="submit" />
                        <a href="booking_success.html">To finish booking.</a>
                    </td>
                </tr>
            </table>
        </form>
    </font>
</body>

</html>
