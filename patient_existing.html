<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABCD Clinic - Log in</title>
</head>

<body>
    <form action="booking_success.html" method="post">
        <table width="100%" cellspacing="0" cellpadding="16">
            <tr>
                <td>
                    <a href="patient.html">
                        <img src="arrow_back.svg" width="24" height="24" />
                    </a>
                </td>
            </tr>
            <tr>
                <td>
                    <h3>
                        Step 3/3: Log in (Returning Patient)
                    </h3>
                    <h1>
                        Please fill in your details.
                    </h1>
                    <p>
                        Please fill in all the fields.
                    </p>
                    <table width="100%" bgcolor="#e1f3f8" border="1" bordercolor="#9e9e9e" cellspacing="0"
                        cellpadding="8">
                        <tr>
                            <th colspan="2" align="left">
                                <i>
                                    Identity Information
                                </i>
                            </th>
                        </tr>
                        <tr>
                            <td>
                                <label for="hkid">
                                    <b>First 6 Digits</b> of your HKID
                                </label>
                                <p></p>
                                <i>e.g. Enter 123456 for S<u>123456</u>(7)</i>
                            </td>
                            <td align="right">
                                <input type="number" id="hkid" name="p_hkid" min="1" max="999999" required />
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <label for="dob">Date of Birth</label>
                            </td>
                            <td align="right">
                                <input type="date" id="dob" name="p_dob" required />
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <label for="tel">Contact No.</label>
                            </td>
                            <td align="right">
                                <input type="tel" id="tel" name="p_tel" minlength="8" maxlength="8" size="12"
                                    required />
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="reset" />
                    <input type="submit" />
                    <a href="booking_success.html">To finish booking.</a>
                </td>
            </tr>
        </table>
    </form>
</body>

</html>
