<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Selection</title>
</head>

<body>
    <font face="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
        <table width="100%" bgcolor="#C5E6FA" cellspacing="0" cellpadding="8">
            <tr>
                <td width="32px">
                    <a href="booking.html">
                        <img src="icons/arrow_back.svg" width="24" height="24" />
                    </a>
                </td>
                <td>
                    <font color="#303F9F">
                        <h2>What are you looking for?</h2>
                        <progress max="4" value="2"></progress>
                    </font>
                </td>
            </tr>
        </table>
        <form action="booking_time.html" method="get">
            <table width="100%" border="1" cellspacing="0" cellpadding="8">
                <tr>
                    <td>
                        <table width="100%" cellspacing="0" cellpadding="8">
                            <tr>
                                <td width="16px">
                                    <input type="radio" id="consultation" name="a_type" value="consultation" required />
                                </td>
                                <td>
                                    <label for="consultation">
                                        <table width="100%" cellspacing="0" cellpadding="0">
                                            <tr>
                                                <td width="72px">
                                                    <img src="icons/stethoscope.svg" width="48" height="48" />
                                                </td>
                                                <td>
                                                    <font color="#303F9F">
                                                        <h3>Doctor Consultation</h3>
                                                        <p>Visit a doctor for a consultation.</p>
                                                    </font>
                                                </td>
                                            </tr>
                                        </table>
                                    </label>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr>
                    <td>
                        <table width="100%" cellspacing="0" cellpadding="8">
                            <tr>
                                <td width="16px">
                                    <input type="radio" id="counselling" name="a_type" value="counselling" required />
                                </td>
                                <td>
                                    <label for="counselling">
                                        <table width="100%" cellspacing="0" cellpadding="0">
                                            <tr>
                                                <td width="72px">
                                                    <img src="icons/diversity_3.svg" width="48" height="48" />
                                                </td>
                                                <td>
                                                    <font color="#303F9F">
                                                        <h3>Counselling</h3>
                                                        <p>Visit a therapist for a counselling session.</p>
                                                    </font>
                                                </td>
                                            </tr>
                                        </table>
                                    </label>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr>
                    <td>
                        <table width="100%" cellspacing="0" cellpadding="8">
                            <tr>
                                <td width="16px">
                                    <input type="radio" id="vaccine" name="a_type" value="vaccine" required />
                                </td>
                                <td>
                                    <label for="vaccine">
                                        <table width="100%" cellspacing="0" cellpadding="0">
                                            <tr>
                                                <td width="72px">
                                                    <img src="icons/syring.svg" width="48" height="48" />
                                                </td>
                                                <td>
                                                    <font color="#303F9F">
                                                        <h3>Flu Vaccine</h3>
                                                        <p>Get a flu vaccine injection.</p>
                                                    </font>
                                                </td>
                                            </tr>
                                        </table>
                                    </label>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
            <table width="100%">
                <tr>
                    <td align="right">
                        <input type="reset" />
                        <input type="submit" />
                    </td>
                </tr>
            </table>
        </form>
    </font>
</body>

</html>
